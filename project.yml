name: TNT
options:
  bundleIdPrefix: com.tnt
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: TNT
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: Sources/App/Info.plist
    CODE_SIGN_ENTITLEMENTS: Sources/App/TNT.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  TNT:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Resources
        buildPhase: resources
      - path: scripts/asr_infer.py
        buildPhase: resources
      - path: scripts/llm_refine.py
        buildPhase: resources
      - path: scripts/tnt_server.py
        buildPhase: resources
      - path: package.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tnt.app
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
