name: TNT
options:
  bundleIdPrefix: com.tnt
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    PRODUCT_NAME: TNT
    MARKETING_VERSION: "1.1.9"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: Sources/App/Info.plist
    CODE_SIGN_ENTITLEMENTS: Sources/App/TNT.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: 0.31.3
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.3
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
  qwen3-asr-swift:
    url: https://github.com/ivan-digital/qwen3-asr-swift
    revision: d28d97883ae09cc97be42f18e7a269a725d1335d

targets:
  TNT:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Resources
        buildPhase: resources
      - path: package.json
        buildPhase: resources
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXFast
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-transformers
        product: Tokenizers
      - package: qwen3-asr-swift
        product: Qwen3ASR
      - package: qwen3-asr-swift
        product: AudioCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tnt.app
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
